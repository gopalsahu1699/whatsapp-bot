<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Add New Campaign Template - Autommensor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { DEFAULT: '#6366f1', dark: '#4f46e5' }, dark: { bg: '#0f172a', card: '#1e293b', border: '#334155' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .nav-link-active { color: #6366f1; border-bottom: 2px solid #6366f1; }
        .mobile-nav-active { background: rgba(99,102,241,0.1); color: #6366f1; border-left: 4px solid #6366f1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-100 font-sans min-h-screen">
    <div class="dashboard pb-20">
        <!-- Header (identical to other pages) -->
        <header class="glass border-b border-dark-border sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-8">
                        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent flex items-center">
                            <span class="mr-2">🤖</span> Autommensor
                        </h1>
                        <nav id="navMenu" class="hidden md:flex space-x-6">
                            <a href="dashboard.html" class="nav-link text-sm font-medium text-slate-400 hover:text-primary transition-colors py-5">Dashboard</a>
                            <a href="bulk.html" class="nav-link text-sm font-medium text-slate-400 hover:text-primary transition-colors py-5">Bulk Messaging</a>
                            <a href="templates.html" class="nav-link text-sm font-medium nav-link-active transition-colors py-5">Templates</a>
                            <a href="training.html" class="nav-link text-sm font-medium text-slate-400 hover:text-primary transition-colors py-5">AI Training</a>
                            <a href="analytics.html" class="nav-link text-sm font-medium text-slate-400 hover:text-primary transition-colors py-5">Analytics</a>
                            <a href="contacts.html" class="nav-link text-sm font-medium text-slate-400 hover:text-primary transition-colors py-5">Contacts CRM</a>
                        </nav>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button id="logoutBtn" class="hidden sm:block px-4 py-2 text-sm font-bold bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition-all">Logout</button>
                        <button id="mobileMenuBtn" class="md:hidden p-2 text-slate-400 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10">
            <section class="glass border border-dark-border rounded-2xl p-8 shadow-xl">
                <h2 class="text-2xl font-bold flex items-center mb-6"><span class="mr-3 text-2xl">📝</span> Add New Campaign Template</h2>
                <div id="templateForm" class="relative w-full max-w-2xl mx-auto bg-dark-card p-5 sm:p-8 rounded-2xl sm:rounded-3xl border border-dark-border shadow-2xl overflow-y-auto max-h-[92vh]">
                    <div class="flex justify-between items-center mb-5 sm:mb-6">
                        <h3 id="formTitle" class="text-base sm:text-lg font-bold text-slate-300 uppercase tracking-widest">Add New Campaign Template</h3>
                        <button type="button" onclick="window.location.href='templates.html'" class="p-2 text-slate-500 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                    <form id="templateFormElement" class="space-y-4 sm:space-y-6">
                        <input type="hidden" id="templateId" />
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label for="templateName" class="block text-sm font-semibold text-slate-400 ml-1">Template Name</label>
                                <input type="text" id="templateName" required class="w-full px-4 py-3 bg-dark-bg/60 border border-dark-border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-slate-600 text-slate-100" />
                            </div>
                            <div class="space-y-2">
                                <label for="templateType" class="block text-sm font-semibold text-slate-400 ml-1">Message Type</label>
                                <select id="templateType" class="w-full px-4 py-3 bg-dark-bg/60 border border-dark-border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-slate-100 placeholder-slate-600">
                                    <option value="text">Text / Image</option>
                                    <option value="poll">Interactive Poll</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label for="templateMessage" id="messageLabel" class="block text-sm font-semibold text-slate-400 ml-1">Message Body (use {{placeholder}} for variables)</label>
                            <textarea id="templateMessage" rows="5" required placeholder="Hello {{name}}, welcome to Autommensor!" class="w-full px-4 py-3 bg-dark-bg/60 border border-dark-border rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-slate-600 font-mono text-sm text-slate-100"></textarea>
                        </div>
                        <div id="pollOptionsSection" class="hidden space-y-4 pt-2 border-t border-dark-border/30">
                            <div class="flex justify-between items-center">
                                <label class="block text-sm font-semibold text-slate-400 ml-1">Poll Options (Min 2, Max 12)</label>
                                <button type="button" id="addPollOptionBtn" class="px-3 py-1 text-xs font-bold bg-primary/20 text-primary hover:bg-primary/30 rounded-lg transition-all border border-primary/30">+ Add Option</button>
                            </div>
                            <div id="pollOptionsList" class="space-y-3"></div>
                        </div>
                        <div class="space-y-2" id="templateImageSection">
                            <label for="templateImage" class="block text-sm font-semibold text-slate-400 ml-1">Visual Asset (Optional Image)</label>
                            <div class="flex flex-col space-y-4">
                                <input type="file" id="templateImage" accept="image/*" class="text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 cursor-pointer" />
                                <div id="currentImage" class="hidden p-4 bg-dark-bg/80 rounded-2xl border border-dark-border/50 inline-block text-center">
                                    <div class="relative inline-block">
                                        <img id="currentImagePreview" class="max-w-[150px] rounded-lg shadow-md border border-slate-700 mx-auto" />
                                        <button type="button" id="removeImageBtn" class="absolute -top-2 -right-2 bg-red-500 hover:bg-red-600 text-white p-1 rounded-full shadow-lg transition-all">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </div>
                                    <p class="text-[10px] text-slate-500 mt-2 font-bold uppercase">Current Image</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-dark-border/30">
                            <button type="submit" class="flex-1 px-8 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/10 transition-all active:scale-95">Save Content</button>
                            <button type="button" onclick="window.location.href='templates.html'" class="px-8 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-xl transition-all">Discard</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script src="template_utils.js"></script>

    <script>
        async function checkAuth() {
            try {
                const response = await fetch('/api/check-auth');
                const data = await response.json();
                if (!data.authenticated) {
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login.html';
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        async function saveTemplate(e) {
            e.preventDefault();

            const id = document.getElementById('templateId').value;
            const name = document.getElementById('templateName').value;
            const type = document.getElementById('templateType').value;
            const message = document.getElementById('templateMessage').value;
            const imageFile = document.getElementById('templateImage').files[0];

            const formData = new FormData();
            formData.append('name', name);
            formData.append('type', type);
            formData.append('message', message);

            if (type === 'poll') {
                const optionInputs = document.querySelectorAll('.poll-option-input');
                const options = Array.from(optionInputs).map(input => input.value.trim()).filter(val => val !== '');
                if (options.length < 2) {
                    alert('A poll must have at least 2 options.');
                    return;
                }
                if (options.length > 12) {
                    alert('A poll can have a maximum of 12 options.');
                    return;
                }
                formData.append('pollOptions', JSON.stringify(options));
            }

            if (imageFile && type !== 'poll') {
                formData.append('image', imageFile);
            }

            const currentImageDiv = document.getElementById('currentImage');
            const isImageRemoved = currentImageDiv ? currentImageDiv.classList.contains('hidden') : true;
            formData.append('removeImage', isImageRemoved ? 'true' : 'false');

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<span class="flex items-center justify-center"><svg class="animate-spin -ml-1 mr-3 h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...</span>';

            try {
                const url = id ? `/api/templates/${id}` : '/api/templates';
                const method = id ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    body: formData,
                    credentials: 'include'
                });

                if (response.ok) {
                    window.location.href = 'templates.html';
                } else {
                    let errorMsg = 'Unknown error';
                    try {
                        const errorData = await response.json();
                        errorMsg = errorData.error || JSON.stringify(errorData);
                    } catch (jsonErr) {
                        errorMsg = await response.text();
                    }
                    alert('Failed to save template: ' + errorMsg);
                }
            } catch (error) {
                alert('Failed to save template: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();

            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            document.getElementById('templateType')?.addEventListener('change', handleTypeChange);
            document.getElementById('addPollOptionBtn')?.addEventListener('click', () => addPollOption());
            document.getElementById('removeImageBtn')?.addEventListener('click', removeCurrentImage);
            document.getElementById('templateFormElement')?.addEventListener('submit', saveTemplate);

            // Check for edit mode via URL parameter
            const params = new URLSearchParams(window.location.search);
            const editId = params.get('id');
            if (editId) {
                // Fetch template data and populate form for editing
                fetch(`/api/templates/${editId}`, { credentials: 'include' })
                    .then(res => {
                        if (!res.ok) throw new Error('Template not found or unauthorized');
                        return res.json();
                    })
                    .then(template => {
                        document.getElementById('templateId').value = template.id || template._id || '';
                        document.getElementById('templateName').value = template.name || '';
                        document.getElementById('templateType').value = template.type || 'text';
                        document.getElementById('templateMessage').value = template.message || '';
                        handleTypeChange();
                        if (template.type === 'poll' && Array.isArray(template.poll_options)) {
                            const list = document.getElementById('pollOptionsList');
                            list.innerHTML = '';
                            template.poll_options.forEach(opt => addPollOption(opt));
                        }
                        if (template.image_path) {
                            document.getElementById('currentImagePreview').src = template.image_path;
                            document.getElementById('currentImage').classList.remove('hidden');
                        }
                        document.getElementById('formTitle').textContent = 'Edit Template Content';
                    })
                    .catch(err => {
                        console.error('Failed to load template for edit:', err);
                        alert('Error loading template: ' + err.message);
                    });
            }
        });
    </script>
</body>
</html>
